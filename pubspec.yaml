name: farmerpulse
description: A production-ready offline-first Flutter app for tracking farmer details and farm usage.
# Prevent accidental publishing to pub.dev
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Localization support (part of Flutter SDK)
  flutter_localizations:
    sdk: flutter

  # ---------- State Management ----------
  # Riverpod: compile-safe, testable, and scalable state management
  flutter_riverpod: ^2.5.1

  # ---------- Navigation ----------
  # go_router: declarative, URL-based routing
  go_router: ^13.2.0

  # ---------- Local Database ----------
  # Hive: fast, lightweight NoSQL store — ideal for offline-first apps
  hive_flutter: ^1.1.0

  # ---------- Localization ----------
  # intl: date/number formatting and ARB-based l10n
  intl: ^0.19.0

  # ---------- Local Notifications ----------
  # flutter_local_notifications: schedule & show local push notifications
  flutter_local_notifications: ^17.1.2

  # ---------- File Operations ----------
  # share_plus: share files and content
  share_plus: ^7.2.2
  
  # file_picker: pick files from device storage
  file_picker: ^6.1.1

  # ---------- Utilities ----------
  # path_provider: locate platform-specific storage paths (needed by Hive)
  path_provider: ^2.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Official Flutter lint rules
  flutter_lints: ^3.0.1

  # Code generation for Hive type adapters
  build_runner: ^2.4.8
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true

  # Enable flutter gen-l10n code generation
  generate: true

  assets:
    - assets/images/

  # Fonts can be added here when needed
  # fonts:
  #   - family: Inter
  #     fonts:
  #       - asset: assets/fonts/Inter-Regular.ttf
